name: Validate with hassfest

on:
  push:
  pull_request:
  # schedule:
  #   - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v5
      - name: Home Assitant Hassfest
        uses: home-assistant/actions/hassfest@master
      - name: Home Assistant Core Integration Check
        uses: home-assistant/actions/core/int-check@master
